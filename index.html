<!DOCTYPE html>
<html>
<head>
    <title>CSS Practical Assignment</title>
    <link rel="stylesheet" href="Assignment1.css">

    <style>
        /* Internal CSS for H6 */
        h6 {
            text-align: center;
            color: red;
        }
    </style>
</head>

<body>

    <h2 id="main-title" style="text-align: center;">
        CSS Assignment
    </h2>

    <h6>Example of Internal CSS</h6>

    <!-- Inline CSS -->
    <p style="color: rgb(35, 12, 241); font-weight: bold;">
        This text uses inline CSS.
    </p>

    <!-- External CSS -->
    <p>
        This text is styled using external CSS.
    </p>

    <!-- Class -->
    <div class="Highlight">
        This is highlighted text.
    </div>

    <!-- Box Model -->
    <div class="box-model">
        Example of box model styling.
    </div>

    <!-- Grid -->
    <div class="grid">
        <div>Column 1</div>
        <div>Column 2</div>
    </div>

    <br>

    <!-- Flexbox -->
    <div class="flex">
        <div>Item A</div>
        <div>Item B</div>
        <div>Item C</div>
    </div>

    <br>

    <!-- Hover -->
    <div class="hover">
        Move mouse here
    </div>

    <!-- Fade -->
    <div class="fade">
        <p>Fade-in effect applied here.</p>
    </div>

    <!-- Rotate -->
    <div class="spinner"></div>
    <p>Rotating element</p>
    <link rel="stylesheet" href="p1.css">
</body>
</html>
